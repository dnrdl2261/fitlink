<!--
  FLOWIN 매직링크(비밀번호 없이 로그인) 템플릿
  Supabase 대시보드 > Authentication > Email Templates > "Magic Link" 의 Message body 에 붙여넣기.
  ⚠️ {{ .ConfirmationURL }} 는 로그인 링크라 반드시 유지할 것.
  Subject(제목) 예시: FLOWIN 로그인 링크입니다 ✨
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#EEF2F9;margin:0;padding:32px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background-color:#FFFFFF;border-radius:20px;overflow:hidden;box-shadow:0 6px 24px rgba(15,23,42,0.08);">

        <!-- 헤더 -->
        <tr>
          <td style="background-color:#4F63F5;padding:32px 32px 28px;text-align:center;">
            <div style="font-size:26px;font-weight:900;letter-spacing:6px;color:#FFFFFF;">FLOWIN</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:6px;">나에게 딱 맞는 트레이너 찾기</div>
          </td>
        </tr>

        <!-- 본문 -->
        <tr>
          <td style="padding:34px 32px 8px;">
            <h1 style="font-size:20px;font-weight:800;color:#0F172A;margin:0 0 12px;">로그인 링크 ✨</h1>
            <p style="font-size:15px;line-height:1.6;color:#475569;margin:0 0 8px;">
              아래 버튼을 누르면 <b style="color:#0F172A;">비밀번호 없이</b> 바로 로그인됩니다.<br/>
              본인 기기에서 열어주세요.
            </p>
          </td>
        </tr>

        <!-- CTA 버튼 -->
        <tr>
          <td style="padding:20px 32px 8px;text-align:center;">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;background-color:#4F63F5;color:#FFFFFF;text-decoration:none;font-size:16px;font-weight:700;padding:15px 40px;border-radius:14px;">
              로그인하기
            </a>
          </td>
        </tr>

        <!-- 대체 링크 -->
        <tr>
          <td style="padding:18px 32px 0;">
            <p style="font-size:12px;line-height:1.6;color:#94A3B8;margin:0;">
              버튼이 동작하지 않으면 아래 링크를 복사해 브라우저에 붙여넣으세요.
            </p>
            <p style="font-size:12px;line-height:1.6;color:#4F63F5;word-break:break-all;margin:6px 0 0;">
              {{ .ConfirmationURL }}
            </p>
          </td>
        </tr>

        <!-- 안내 -->
        <tr>
          <td style="padding:24px 32px 0;">
            <div style="background-color:#F1F5F9;border-radius:12px;padding:14px 16px;">
              <p style="font-size:12px;line-height:1.6;color:#64748B;margin:0;">
                🔒 본인이 요청하지 않았다면 이 메일을 무시하세요. 이 링크는 잠시 후 만료되며 1회만 사용할 수 있습니다.
              </p>
            </div>
          </td>
        </tr>

        <!-- 푸터 -->
        <tr>
          <td style="padding:28px 32px 32px;text-align:center;">
            <div style="font-size:13px;font-weight:800;letter-spacing:3px;color:#94A3B8;">FLOWIN</div>
            <p style="font-size:11px;color:#CBD5E1;margin:8px 0 0;">
              건강한 운동의 시작, FLOWIN과 함께하세요.<br/>
              © 2026 FLOWIN. All rights reserved.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
